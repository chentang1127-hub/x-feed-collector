name: Collect X Tweets

on:
  # 允许手动触发（backfill / pdf 模式）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'collect'
        type: choice
        options:
          - collect
          - backfill
          - pdf

jobs:
  collect:
    runs-on: ubuntu-latest
    # 关键：给 Workflow 写权限，才能把去重记录 commit 回仓库
    permissions:
      contents: write

    steps:
      # 1. 签出代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行采集脚本（根据模式）
      - name: Run collector
        env:
          X_AUTH_TOKEN:    ${{ secrets.X_AUTH_TOKEN }}
          X_CT0:           ${{ secrets.X_CT0 }}
          FEISHU_APP_ID:   ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_VIP_WEBHOOK_URL: ${{ secrets.FEISHU_VIP_WEBHOOK_URL }}
          TARGET_USERNAME: "aleabitoreddit"
        run: |
          if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
            echo "📥 回填模式: 拉取 100 条历史推文"
            python main.py --backfill
          elif [ "${{ github.event.inputs.mode }}" = "pdf" ]; then
            echo "📄 PDF 导出模式: 导出订阅专属推文"
            python export_pdf.py
            echo "pdf_path=$(ls tweets_export_*.pdf)" >> $GITHUB_ENV
          else
            echo "📢 常规采集模式"
            python main.py
          fi

      # 5. 上传 PDF（仅 pdf 模式）
      - name: Upload PDF artifact
        if: github.event.inputs.mode == 'pdf'
        uses: actions/upload-artifact@v4
        with:
          name: subscriber-tweets-pdf
          path: tweets_export_*.pdf

      # 6. 把更新后的去重记录提交回仓库
      #    这样下次运行就能知道哪些推文已经处理过了
      - name: Commit seen_tweets.json
        if: always()  # 即使上一步有推文失败，也保存已成功的部分
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main  # 先拉取远端最新去重记录，避免覆盖
          git add data/seen_tweets.json
          if git diff --staged --quiet; then
            echo "📭 去重记录无变化"
          else
            git commit -m "chore: update seen tweets [skip ci]"
            git push
            echo "✅ 去重记录已提交"
          fi
