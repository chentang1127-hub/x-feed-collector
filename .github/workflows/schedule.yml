name: Scheduled Collection

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'
  workflow_dispatch:  # 手动测试
  repository_dispatch:  # 自触发（workflow 跑完后调度下一次）
    types: [collect]

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        env:
          X_AUTH_TOKEN:    ${{ secrets.X_AUTH_TOKEN }}
          X_CT0:           ${{ secrets.X_CT0 }}
          FEISHU_APP_ID:   ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_VIP_WEBHOOK_URL: ${{ secrets.FEISHU_VIP_WEBHOOK_URL }}
          TARGET_USERNAME: "aleabitoreddit"
        run: |
          echo "📢 定时采集模式"
          python main.py

      - name: Commit seen_tweets.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_tweets.json
          if git diff --staged --quiet; then
            echo "📭 去重记录无变化"
          else
            git commit -m "chore: update seen tweets [skip ci]"
            git push
            echo "✅ 去重记录已提交"
          fi

      # 🔁 自触发：等待 10 分钟后调度下一次运行
      - name: Schedule next run
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "⏳ 等待 10 分钟后触发下一次采集..."
          sleep 600  # 10 分钟
          curl -s -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/chentang1127-hub/x-feed-collector/dispatches \
            -d '{"event_type":"collect"}'
          echo "🔁 已触发下一次采集"
