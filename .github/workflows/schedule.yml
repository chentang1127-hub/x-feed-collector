name: Scheduled Collection

on:
  workflow_dispatch:
  repository_dispatch:
    types: [collect]

concurrency:
  group: scheduled-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        env:
          X_AUTH_TOKEN:    ${{ secrets.X_AUTH_TOKEN }}
          X_CT0:           ${{ secrets.X_CT0 }}
          FEISHU_APP_ID:   ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_VIP_WEBHOOK_URL: ${{ secrets.FEISHU_VIP_WEBHOOK_URL }}
          TARGET_USERNAME: "aleabitoreddit,chuge857"
        run: |
          echo "Collecting tweets..."
          python main.py

      - name: Commit seen_tweets.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add data/seen_tweets.json
          if git diff --staged --quiet; then
            echo "No changes to seen_tweets.json"
          else
            git commit -m "chore: update seen tweets [skip ci]"
            git push
            echo "Seen tweets committed"
          fi

      - name: Schedule next run
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set +e
          RUNNING=$(curl -s -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=in_progress&status=queued&status=pending&per_page=20" | \
            python3 -c "
import json,sys
try:
    data=json.load(sys.stdin)
    others=[r for r in data['workflow_runs'] if r['id']!='${{ github.run_id }}']
    print(len(others))
except:
    print(0)
" 2>/dev/null || echo "0")
          RUNNING=${RUNNING:-0}
          if [ "$RUNNING" -gt 0 ]; then
            echo "Skipping dispatch, chain is alive ($RUNNING others)"
            exit 0
          fi
          echo "Waiting 30 minutes..."
          sleep 1800
          curl -s -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"collect"}' || echo "Dispatch failed, will retry next time"
          echo "Dispatch done"
